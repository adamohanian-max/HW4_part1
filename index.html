<!--
    HW3 - Dynamic Multiplication Table
    File:   index.html
    Author: Adam Ohanian
    Email:  adam_ohanian@student.uml.edu
    Date:   2026-06-01

  Description:
    The user inputs minimum and maximum
    values for both the table's rows and columns, then clicks
    "Generate Table" to render a multiplication
    table.

  Dependencies:
    css/style.css
    js/script.js

  Notes:
    - Input type is set to "any" to allow the JS layer to
      handle all validation and error feedback manually and prevent the "pop ups"
    - The table is rebuilt from scratch on every form submit,
      replacing any previous table in the container.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HW4 pt1</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>Dynamic Multiplication Table</h1>

<form id="tableForm">
  <label for="minCol">Minimum Column Value</label>
  <input type="text" id="minCol" name="minCol">

  <label for="maxCol">Maximum Column Value</label>
  <input type="text" id="maxCol" name="maxCol">

  <label for="minRow">Minimum Row Value</label>
  <input type="text" id="minRow" name="minRow">

  <label for="maxRow">Maximum Row Value</label>
  <input type="text" id="maxRow" name="maxRow">

  <button type="submit">Generate Table</button>
</form>

<div id="error-message"></div>
<div id="table-container"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
